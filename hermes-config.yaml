# Hermes (brain/orchestrator) config — excerpt of ~/.hermes/config.yaml
# Open-source stack: LFM2.5-Thinking MLX 4-bit via LM Studio.
#
# LM Studio model ID: lfm2.5-1.2b-thinking-mlx
# Local Server port 1234 (LM Studio default — shared with OpenClaw, routed by model ID).
# See MODEL_STACK.md

model:
  default: lfm2.5-1.2b-thinking-mlx
  provider: custom
  base_url: http://127.0.0.1:1234/v1
  max_tokens: 4096
  # Hermes requires >= 64K; must match LM Studio load context for thinking-mlx
  context_length: 90112
  api_key: lm-studio

toolsets:
  - hermes-cli

memory:
  enabled: true
  store_path: ~/.hermes/memory/

skills:
  paths:
    - ./skills

cron:
  - name: forge2-heartbeat
    schedule: "*/30 * * * *"
    channel: ${CH_AGENT_LOG}
    prompt: "Post a one-line Forge 2 progress update using the status-report skill format."
